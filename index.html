<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shui Pai">
<meta name="theme-color" content="#0d1117">
<title>水牌 Shui Pai</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@300;400&display=swap');

/* ═══ THEMES ═══ */
:root {
  --bg:               #0d1117;
  --paper:            #e8dcc8;
  --paper-dim:        #9a8e78;
  --red:              #c0392b;
  --red-dark:         #7a1a12;
  --gold:             #c9a84c;
  --tray-bg:          #0a0f18;
  --tray-border:      #1e2d42;
  --edge-w:           5px;
  --radius:           12px;
  /* tile colors — overridden per theme */
  --tile-face:        #c8b888;
  --tile-face-hi:     #d8c898;
  --tile-border:      #6a5428;
  --tile-edge-r:      #4a3818;
  --tile-edge-b:      #3a2c10;
  --tile-back:        #2a3a50;
  --tile-back-hi:     #3a4f6a;
  --tile-back-border: #1a2a3a;
  --tile-ink:         #1e1004;
  --tile-red:         #7a1a12;
  --tile-shadow:      rgba(0,0,0,0.7);
}
/* Theme: Ink (default warm amber) */
.theme-ink {
  --tile-face:        #c8b888; --tile-face-hi:     #dac898;
  --tile-border:      #6a5428; --tile-edge-r:      #4a3818; --tile-edge-b: #3a2c10;
  --tile-back:        #2a3a50; --tile-back-hi:     #3a4f6a; --tile-back-border: #1a2a3a;
  --tile-ink:         #1e1004; --tile-red:         #8b1a10;
}
/* Theme: Lacquer — deep red and black */
.theme-lacquer {
  --tile-face:        #c0392b; --tile-face-hi:     #d44032;
  --tile-border:      #7a1010; --tile-edge-r:      #4a0808; --tile-edge-b: #380606;
  --tile-back:        #1a0808; --tile-back-hi:     #2a1010; --tile-back-border: #0a0404;
  --tile-ink:         #f5e6c8; --tile-red:         #f5e6c8;
}
/* Theme: Jade — deep green */
.theme-jade {
  --tile-face:        #2d6a4f; --tile-face-hi:     #3a8a64;
  --tile-border:      #1a4a38; --tile-edge-r:      #0f3028; --tile-edge-b: #0a2018;
  --tile-back:        #0d2818; --tile-back-hi:     #1a3a28; --tile-back-border: #081808;
  --tile-ink:         #d4f0c8; --tile-red:         #f0c840;
}
/* Theme: Stone — cool grey slate */
.theme-stone {
  --tile-face:        #7a8090; --tile-face-hi:     #8a90a0;
  --tile-border:      #4a5060; --tile-edge-r:      #303840; --tile-edge-b: #202830;
  --tile-back:        #181e28; --tile-back-hi:     #242c38; --tile-back-border: #101418;
  --tile-ink:         #e8eaf0; --tile-red:         #e06050;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--paper); overflow: hidden;
  touch-action: manipulation; -webkit-font-smoothing: antialiased;
}
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.screen.hidden { display: none; }

/* ═══ TITLE ═══ */
#title-screen { background: var(--bg); }
.title-art { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.title-kanji {
  font-family: 'Noto Serif SC', serif; font-weight: 900;
  font-size: clamp(84px,22vw,110px); color: var(--paper);
  line-height: 1; letter-spacing: -0.02em;
  text-shadow: 5px 6px 0 var(--red-dark), 0 0 50px rgba(192,57,43,0.25);
}
.title-pinyin { font-size: 11px; font-weight: 300; letter-spacing: 0.38em; text-transform: uppercase; color: var(--paper-dim); }
.title-rule { width: 44px; height: 1px; background: var(--gold); opacity: 0.45; margin: 16px 0 12px; }
.title-sub { font-size: 10px; color: var(--paper-dim); letter-spacing: 0.2em; opacity: 0.55; }
.title-preview { display: flex; gap: 12px; margin: 28px 0 32px; }
.ptile { position: relative; width: 44px; height: 66px; animation: float 3s ease-in-out infinite; }
.ptile:nth-child(2){animation-delay:.5s} .ptile:nth-child(3){animation-delay:1s} .ptile:nth-child(4){animation-delay:1.5s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ptile .t-face {
  position: absolute; inset: 0;
  background: linear-gradient(145deg, var(--tile-face-hi) 0%, var(--tile-face) 100%);
  border: 2px solid var(--tile-border); border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 900;
  color: var(--tile-ink); box-shadow: 3px 3px 10px var(--tile-shadow); z-index: 2;
}
.ptile .t-edge-r {
  position: absolute; top: var(--edge-w); right: calc(-1 * var(--edge-w));
  width: var(--edge-w); bottom: calc(-1 * var(--edge-w));
  background: var(--tile-edge-r); border-radius: 0 4px 4px 0; z-index: 1;
}
.ptile .t-edge-b {
  position: absolute; bottom: calc(-1 * var(--edge-w)); left: var(--edge-w);
  height: var(--edge-w); right: calc(-1 * var(--edge-w));
  background: var(--tile-edge-b); border-radius: 0 0 4px 4px; z-index: 1;
}
.btn-primary {
  background: var(--red); color: var(--paper); border: none; border-radius: var(--radius);
  padding: 14px 52px; font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700;
  letter-spacing: 0.18em; cursor: pointer; box-shadow: 0 4px 22px rgba(192,57,43,0.45);
  transition: transform .1s; -webkit-tap-highlight-color: transparent;
}
.btn-primary:active { transform: scale(0.97); }
.level-display { margin-top: 16px; font-size: 11px; color: var(--paper-dim); letter-spacing: 0.14em; opacity: 0.5; }

/* ═══ GAME SCREEN ═══ */
#game-screen { background: var(--bg); justify-content: flex-start; }

/* top bar */
.top-bar {
  width: 100%; display: flex; align-items: center;
  justify-content: space-between; padding: 10px 14px 4px; flex-shrink: 0;
}
.top-bar-left { display: flex; flex-direction: column; }
.level-label { font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700; color: var(--paper); letter-spacing: 0.05em; }
.top-bar-right { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: var(--paper); width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .15s;
}
.icon-btn:active { background: rgba(255,255,255,0.14); }

/* ═══ TRAY ═══ */
.tray-section {
  width: 100%; flex-shrink: 0;
  padding: 2px 14px 4px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.tray-label { font-size: 9px; color: var(--paper-dim); letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.4; }
/* Outer container with border+fill wrapping only the slots */
.tray-slots-wrap {
  display: flex; gap: 8px; justify-content: center; align-items: center;
  background: #161e2e;
  border: 1.5px solid #4a7fa8;
  border-radius: 14px;
  padding: 7px 10px;
}
.tray { display: contents; } /* tray div is now just a passthrough — slots render inside tray-slots-wrap */
.tray-slot { flex-shrink: 0; position: relative; }
.tray-slot-bg {
  position: absolute; inset: 0;
  background: var(--tray-bg); border: 1.5px dashed var(--tray-border);
  border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
}
.tray-slot-num { font-size: 10px; color: var(--tray-border); opacity: 0.4; }
.tray-tile { position: absolute; inset: 0; }
.tray-tile .t-face {
  position: absolute; inset: 0;
  background: linear-gradient(145deg, var(--tile-face-hi) 0%, var(--tile-face) 100%);
  border: 2px solid var(--tile-border); border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center; z-index: 2; overflow: hidden;
}
.tray-tile .t-face::before {
  content: ''; position: absolute; inset: 3px;
  border-radius: calc(var(--radius) - 3px); border: 1px solid rgba(255,255,255,0.15); pointer-events: none;
}
.tray-tile .t-edge-r {
  position: absolute; background: var(--tile-edge-r); border-radius: 0 4px 4px 0; z-index: 1;
}
.tray-tile .t-edge-b {
  position: absolute; background: var(--tile-edge-b); border-radius: 0 0 4px 4px; z-index: 1;
}
.tray-tile.match-clear { animation: match-out .35s ease-in forwards; }
.tray-tile.danger-flash { animation: danger-shake .5s ease-in-out; }
@keyframes danger-shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)}
  40%{transform:translateX(4px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(2px)}
}

/* ═══ PROGRESS ═══ */
.progress-bar-wrap {
  width: calc(100% - 28px); height: 2px;
  background: rgba(255,255,255,0.07); border-radius: 2px;
  margin: 0 14px 3px; flex-shrink: 0;
}
.progress-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .4s ease; }

/* ═══ BOARD ═══ */
.board-wrapper {
  flex: 1; width: 100%;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; padding: 4px 10px 4px; position: relative;
}
#board { position: relative; }

/* ═══ 3D TILE ═══ */
.tile { position: absolute; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.tile-inner {
  position: absolute; inset: 0;
  transform-style: preserve-3d;
  transition: transform 0.42s cubic-bezier(.4,0,.2,1);
}
.tile.face-down .tile-inner { transform: rotateY(180deg); }
.t-face {
  position: absolute; inset: 0;
  background: linear-gradient(145deg, var(--tile-face-hi) 0%, var(--tile-face) 60%);
  border: 2px solid var(--tile-border); border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  backface-visibility: hidden; z-index: 2; overflow: hidden;
}
.t-face::before {
  content: ''; position: absolute; inset: 3px;
  border-radius: calc(var(--radius) - 3px); border: 1px solid rgba(255,255,255,0.18); pointer-events: none;
}
.t-back {
  position: absolute; inset: 0;
  background: linear-gradient(145deg, var(--tile-back-hi) 0%, var(--tile-back) 60%);
  border: 2px solid var(--tile-back-border); border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  backface-visibility: hidden; transform: rotateY(180deg); z-index: 2;
}
.t-back::before {
  content: ''; position: absolute; inset: 4px;
  border-radius: calc(var(--radius) - 4px); border: 1px solid rgba(255,255,255,0.07);
  background: repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,0.03) 4px,rgba(255,255,255,0.03) 5px);
  pointer-events: none;
}
.t-back-glyph { font-family: 'Noto Serif SC', serif; font-weight: 900; color: rgba(255,255,255,0.1); pointer-events: none; user-select: none; }
.t-edge-r { position: absolute; background: var(--tile-edge-r); border-radius: 0 5px 5px 0; z-index: 1; }
.t-edge-b { position: absolute; background: var(--tile-edge-b); border-radius: 0 0 5px 5px; z-index: 1; }
.tile-symbol { font-family: 'Noto Serif SC', serif; font-weight: 900; line-height: 1; color: var(--tile-ink); pointer-events: none; user-select: none; }
.tile-symbol.red-sym { color: var(--tile-red); }
.tile-corner { position: absolute; top: 4px; left: 5px; font-family: 'Noto Serif SC', serif; font-weight: 700; color: var(--tile-ink); opacity: 0.4; pointer-events: none; user-select: none; }
.tile.hint-glow .t-face { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold); animation: hint-pulse 1s ease-in-out 3; }
@keyframes hint-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.tile.revealed .t-face { border-color: var(--gold); box-shadow: 0 0 0 1.5px var(--gold); }
.tile.match-clear { animation: match-out .32s ease-in forwards; z-index: 200; }
@keyframes match-out { 0%{transform:scale(1.05);opacity:1} 50%{transform:scale(1.12);opacity:0.6} 100%{transform:scale(0.2);opacity:0} }

/* flying tile animation */
.tile-fly {
  position: fixed; pointer-events: none; z-index: 500;
  border-radius: var(--radius);
  background: linear-gradient(145deg, var(--tile-face-hi) 0%, var(--tile-face) 100%);
  border: 2px solid var(--tile-border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif SC', serif; font-weight: 900; color: var(--tile-ink);
  box-shadow: 4px 4px 16px rgba(0,0,0,0.7);
  transition: none;
}
.tile-fly.red-sym-fly { color: var(--tile-red); }

/* ═══ BOTTOM BAR — power-ups ═══ */
.bottom-bar {
  width: 100%; flex-shrink: 0;
  display: flex; justify-content: center; align-items: center;
  gap: 16px; padding: 6px 14px 10px;
}
.power-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 10px 0; cursor: pointer;
  -webkit-tap-highlight-color: transparent; transition: background .15s, transform .1s;
  width: 72px;
}
.power-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
.power-btn.disabled { opacity: 0.35; cursor: default; }
.power-btn.disabled:active { transform: none; }
.power-icon { font-size: 22px; line-height: 1; }
.power-count {
  font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 700; color: var(--gold);
  min-width: 16px; text-align: center;
}

/* ═══ OVERLAYS ═══ */
.overlay {
  position: absolute; inset: 0;
  background: rgba(10,14,20,0.92);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; z-index: 100; backdrop-filter: blur(5px);
}
.overlay.hidden { display: none; }
.overlay-kanji {
  font-family: 'Noto Serif SC', serif; font-weight: 900;
  font-size: clamp(80px,22vw,112px); color: var(--paper);
  text-shadow: 5px 6px 0 var(--red-dark);
  animation: pop-in .4s cubic-bezier(.34,1.56,.64,1) both;
}
.overlay-kanji.win { color: #c0f0a0; text-shadow: 5px 6px 0 #1a5010; }
@keyframes pop-in{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.overlay-sub { font-size: 12px; color: var(--paper-dim); letter-spacing: 0.22em; margin-bottom: 4px; }
.overlay-btns { display: flex; gap: 12px; }
.btn-sec {
  background: transparent; color: var(--paper); border: 1px solid rgba(255,255,255,0.22); border-radius: 8px;
  padding: 11px 22px; font-family: 'Noto Sans SC', sans-serif; font-size: 12px; letter-spacing: 0.1em;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .15s;
}
.btn-sec:active { background: rgba(255,255,255,0.1); }

/* Level complete summary */
.win-stats {
  display: flex; gap: 24px; margin: 4px 0 8px;
}
.win-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.win-stat-val { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; color: var(--paper); }
.win-stat-lbl { font-size: 9px; color: var(--paper-dim); letter-spacing: 0.15em; text-transform: uppercase; }
.win-stars { font-size: 28px; letter-spacing: 6px; }

/* Pause menu */
#pause-overlay .pause-title {
  font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700;
  color: var(--paper); letter-spacing: 0.1em; margin-bottom: 6px;
}
.theme-row {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  margin: 4px 0 8px;
}
.theme-label { font-size: 10px; color: var(--paper-dim); letter-spacing: 0.15em; text-transform: uppercase; }
.theme-name {
  font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 700;
  color: var(--gold); letter-spacing: 0.1em;
}

/* ═══ PARTICLES ═══ */
#particle-canvas {
  position: fixed; inset: 0; pointer-events: none; z-index: 300;
}

/* Toast */
#toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: rgba(10,14,20,0.95); border: 1px solid var(--gold);
  color: var(--paper); padding: 9px 18px; border-radius: 8px;
  font-size: 12px; letter-spacing: 0.1em;
  opacity: 0; transition: opacity .3s, transform .3s;
  pointer-events: none; z-index: 400; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* powerup earned toast */
#powerup-toast {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(10,14,20,0.96); border: 1px solid var(--gold);
  color: var(--paper); padding: 14px 28px; border-radius: 12px;
  font-size: 13px; letter-spacing: 0.12em; text-align: center;
  opacity: 0; transition: opacity .3s, transform .3s;
  pointer-events: none; z-index: 401;
}
#powerup-toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
#powerup-toast .pt-val { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; color: var(--gold); }
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<!-- ═══ TITLE ═══ -->
<div id="title-screen" class="screen">
  <div class="title-art">
    <div class="title-kanji">水牌</div>
    <div class="title-pinyin">Shui Pái</div>
    <div class="title-rule"></div>
    <div class="title-sub">tile matching</div>
  </div>
  <div class="title-preview">
    <div class="ptile"><div class="t-face">竹</div><div class="t-edge-r"></div><div class="t-edge-b"></div></div>
    <div class="ptile"><div class="t-face">風</div><div class="t-edge-r"></div><div class="t-edge-b"></div></div>
    <div class="ptile"><div class="t-face" style="color:var(--tile-red)">花</div><div class="t-edge-r"></div><div class="t-edge-b"></div></div>
    <div class="ptile"><div class="t-face">龍</div><div class="t-edge-r"></div><div class="t-edge-b"></div></div>
  </div>
  <button class="btn-primary" id="start-btn">開始</button>
  <div class="level-display" id="title-level">Level 1</div>
</div>

<!-- ═══ GAME ═══ -->
<div id="game-screen" class="screen hidden theme-ink">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="level-label" id="level-label">Level 1</div>
    </div>
    <div class="top-bar-right">
      <div class="icon-btn" id="pause-btn">⏸</div>
    </div>
  </div>

  <div class="tray-section">
    <div class="tray-label">holding tray</div>
    <div class="tray-slots-wrap">
      <div class="tray" id="tray"></div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="board-wrapper">
    <div id="board"></div>
  </div>

  <div class="bottom-bar">
    <div class="power-btn" id="btn-shuffle">
      <span class="power-icon">🔀</span>
      <span class="power-count" id="cnt-shuffle">5</span>
    </div>
    <div class="power-btn" id="btn-hint">
      <span class="power-icon">💡</span>
      <span class="power-count" id="cnt-hint">5</span>
    </div>
    <div class="power-btn" id="btn-undo">
      <span class="power-icon">↩️</span>
      <span class="power-count" id="cnt-undo">5</span>
    </div>
  </div>

  <!-- Win overlay -->
  <div class="overlay hidden" id="win-overlay">
    <div class="overlay-kanji win">勝</div>
    <div class="win-stars" id="win-stars">★★★</div>
    <div class="win-stats">
      <div class="win-stat">
        <div class="win-stat-val" id="win-time">0:00</div>
        <div class="win-stat-lbl">Time</div>
      </div>
      <div class="win-stat">
        <div class="win-stat-val" id="win-best">—</div>
        <div class="win-stat-lbl">Best</div>
      </div>
    </div>
    <div class="overlay-sub" id="win-sub"></div>
    <div class="overlay-btns">
      <button class="btn-sec" id="next-btn">Next Level →</button>
    </div>
  </div>

  <!-- Stuck overlay -->
  <div class="overlay hidden" id="stuck-overlay">
    <div class="overlay-kanji">止</div>
    <div class="overlay-sub">no moves remain</div>
    <div class="overlay-btns">
      <button class="btn-sec" id="stuck-shuffle-btn">Shuffle</button>
      <button class="btn-sec" id="restart-btn">Restart</button>
    </div>
  </div>

  <!-- Fail overlay -->
  <div class="overlay hidden" id="fail-overlay">
    <div class="overlay-kanji">敗</div>
    <div class="overlay-sub">tray is full — no match</div>
    <div class="overlay-btns">
      <button class="btn-sec" id="fail-restart-btn">Try Again</button>
    </div>
  </div>

  <!-- Pause overlay -->
  <div class="overlay hidden" id="pause-overlay">
    <div class="pause-title">pause</div>
    <div class="theme-row">
      <div class="theme-label">current theme</div>
      <div class="theme-name" id="pause-theme-name">Ink</div>
    </div>

      <button class="btn-sec" id="resume-btn">Resume</button>
      <button class="btn-sec" id="pause-restart-btn">Restart Level</button>

  </div>
</div>

<div id="toast"></div>
<div id="powerup-toast"><div class="pt-val" id="pt-val"></div><div id="pt-msg"></div></div>

<script>
'use strict';

// ══════════════════════════════════════════════════
//  TILE SET
// ══════════════════════════════════════════════════
const SUITS = [
  {sym:'一',corner:'萬',red:false},{sym:'二',corner:'萬',red:false},{sym:'三',corner:'萬',red:false},
  {sym:'四',corner:'萬',red:false},{sym:'五',corner:'萬',red:false},{sym:'六',corner:'萬',red:false},
  {sym:'七',corner:'萬',red:false},{sym:'八',corner:'萬',red:false},{sym:'九',corner:'萬',red:false},
  {sym:'竹',corner:'木',red:false},{sym:'林',corner:'木',red:false},{sym:'森',corner:'木',red:false},
  {sym:'梅',corner:'木',red:false},{sym:'松',corner:'木',red:false},{sym:'柳',corner:'木',red:false},
  {sym:'桃',corner:'木',red:false},{sym:'菊',corner:'木',red:false},{sym:'蘭',corner:'木',red:false},
  {sym:'日',corner:'天',red:false},{sym:'月',corner:'天',red:false},{sym:'星',corner:'天',red:false},
  {sym:'雲',corner:'天',red:false},{sym:'雪',corner:'天',red:false},{sym:'風',corner:'天',red:false},
  {sym:'雷',corner:'天',red:true },{sym:'霧',corner:'天',red:false},{sym:'霜',corner:'天',red:false},
  {sym:'火',corner:'元',red:true },{sym:'水',corner:'元',red:false},{sym:'土',corner:'元',red:false},
  {sym:'木',corner:'元',red:false},{sym:'金',corner:'元',red:true },{sym:'氣',corner:'元',red:false},
  {sym:'東',corner:'風',red:true },{sym:'南',corner:'風',red:true },
  {sym:'西',corner:'風',red:true },{sym:'北',corner:'風',red:true },
  {sym:'中',corner:'龍',red:true },{sym:'發',corner:'龍',red:false},{sym:'白',corner:'龍',red:false},
  {sym:'鳥',corner:'獸',red:false},{sym:'魚',corner:'獸',red:false},{sym:'龜',corner:'獸',red:false},
  {sym:'鶴',corner:'獸',red:false},{sym:'蝶',corner:'獸',red:true },{sym:'虎',corner:'獸',red:true },
  {sym:'花',corner:'季',red:true },{sym:'春',corner:'季',red:false},
  {sym:'夏',corner:'季',red:false},{sym:'秋',corner:'季',red:true },
  {sym:'冬',corner:'季',red:false},{sym:'蓮',corner:'季',red:true },
  {sym:'山',corner:'地',red:false},{sym:'川',corner:'地',red:false},{sym:'海',corner:'地',red:false},
  {sym:'島',corner:'地',red:false},{sym:'谷',corner:'地',red:false},{sym:'峰',corner:'地',red:false},
  {sym:'天',corner:'宙',red:false},{sym:'地',corner:'宙',red:false},{sym:'宙',corner:'宙',red:false},
  {sym:'光',corner:'宙',red:true },{sym:'影',corner:'宙',red:false},{sym:'空',corner:'宙',red:false},
  {sym:'福',corner:'德',red:true },{sym:'壽',corner:'德',red:false},{sym:'祿',corner:'德',red:true },
  {sym:'仁',corner:'德',red:false},{sym:'義',corner:'德',red:false},{sym:'禮',corner:'德',red:false},
];

// ══════════════════════════════════════════════════
//  THEMES
// ══════════════════════════════════════════════════
const THEMES = [
  { id:'theme-ink',     name:'Ink'     },
  { id:'theme-lacquer', name:'Lacquer' },
  { id:'theme-jade',    name:'Jade'    },
  { id:'theme-stone',   name:'Stone'   },
];

// ══════════════════════════════════════════════════
//  RNG
// ══════════════════════════════════════════════════
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════════════
//  LAYOUT (half-offset stacking)
// ══════════════════════════════════════════════════
function buildLayout(level) {
  const cols = level <= 3 ? 6 : level <= 10 ? 8 : level <= 20 ? 10 : 12;
  const rows = level <= 3 ? 5 : level <= 10 ? 6 : level <= 20 ? 7  : 8;
  const maxLayers = level <= 5 ? 1 : level <= 15 ? 2 : level <= 30 ? 3 : 4;
  const positions = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      positions.push({ col:c, row:r, layer:0 });
  for (let l = 1; l < maxLayers; l++) {
    const offset = l * 0.5;
    for (let r = offset; r <= rows - 1 - offset; r++)
      for (let c = offset; c <= cols - 1 - offset; c++)
        positions.push({ col:c, row:r, layer:l });
  }
  return { positions, cols, rows };
}

// ══════════════════════════════════════════════════
//  PERSISTENT STATE
// ══════════════════════════════════════════════════
const SK = {
  level:    'shuipai_level_v2',
  hints:    'shuipai_hints',
  shuffles: 'shuipai_shuffles',
  undos:    'shuipai_undos',
  nextPow:  'shuipai_next_powerup_level',  // next level at which powerups are awarded
  bests:    'shuipai_bests',               // JSON object {levelNum: bestTimeSeconds}
};
function ls(key, def) {
  try { const v = localStorage.getItem(key); return v === null ? def : JSON.parse(v); }
  catch(e) { return def; }
}
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }

// ══════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════
let G = {
  level: 1,
  tiles: [], tray: [], totalPairs: 0, matchedPairs: 0,
  cols: 0, rows: 0, tileW: 0, tileH: 0,
  revealedId: null,
  undoStack: [],  // [{typeIndex, tileId, slotIdx}] — last sent tile
  powerups: { hints:5, shuffles:5, undos:5 },
  nextPowerupLevel: 0,  // level at which next powerup batch is awarded
  theme: THEMES[0],
  startTime: 0,
  timerInterval: null,
};

function loadPersisted() {
  G.level = ls(SK.level, 1);
  if (isNaN(G.level) || G.level < 1) G.level = 1;
  G.powerups.hints    = ls(SK.hints,    5);
  G.powerups.shuffles = ls(SK.shuffles, 5);
  G.powerups.undos    = ls(SK.undos,    5);
  G.nextPowerupLevel  = ls(SK.nextPow,  pickNextPowerupLevel(G.level));
}

function savePersisted() {
  lsSet(SK.level,    G.level);
  lsSet(SK.hints,    G.powerups.hints);
  lsSet(SK.shuffles, G.powerups.shuffles);
  lsSet(SK.undos,    G.powerups.undos);
  lsSet(SK.nextPow,  G.nextPowerupLevel);
}

// Pick next powerup level: current + RNG(1–5)
function pickNextPowerupLevel(currentLevel) {
  const rng = mulberry32(currentLevel * 1234567 + Date.now() % 99991);
  return currentLevel + Math.floor(rng() * 5) + 1;
}
// Pick powerup award count: RNG(1–3)
function pickPowerupAmount(currentLevel) {
  const rng = mulberry32(currentLevel * 9876543 + Date.now() % 77777);
  return Math.floor(rng() * 3) + 1;
}

// ══════════════════════════════════════════════════
//  GENERATE LEVEL
// ══════════════════════════════════════════════════
function generateLevel(level) {
  const rng = mulberry32(level * 2654435761 + 987654321);
  const { positions, cols, rows } = buildLayout(level);
  const pairs = Math.floor(positions.length / 2);
  const usedCount = pairs * 2;
  const pool = Array.from({length:pairs}, (_,i) => i % SUITS.length);
  const types = []; pool.forEach(t => { types.push(t); types.push(t); });
  seededShuffle(types, rng);
  const fdr = Math.min(0.5, Math.max(0, (level - 5) * 0.04));
  // Theme: seeded per level
  const themeIdx = Math.floor(rng() * THEMES.length);
  const theme = THEMES[themeIdx];
  const tiles = positions.slice(0, usedCount).map((pos, i) => ({
    id:i, col:pos.col, row:pos.row, layer:pos.layer,
    typeIndex:types[i], matched:false, inTray:false,
    faceDown: rng() < fdr, revealed:false, el:null,
  }));
  return { tiles, cols, rows, totalPairs:pairs, theme };
}

// ══════════════════════════════════════════════════
//  FREE TILE CHECK
// ══════════════════════════════════════════════════
function tilesOverlap(cA, rA, cB, rB) {
  return Math.abs(cA - cB) < 1 && Math.abs(rA - rB) < 1;
}
function isTileFree(tile) {
  if (tile.matched || tile.inTray) return false;
  const hasAbove = G.tiles.some(t =>
    !t.matched && !t.inTray && t.layer === tile.layer + 1 && tilesOverlap(t.col,t.row,tile.col,tile.row)
  );
  if (hasAbove) return false;
  const leftBlocked  = G.tiles.some(t => !t.matched && !t.inTray && t.layer===tile.layer && Math.abs(t.row-tile.row)<0.1 && Math.abs(t.col-tile.col-1)<0.1);
  const rightBlocked = G.tiles.some(t => !t.matched && !t.inTray && t.layer===tile.layer && Math.abs(t.row-tile.row)<0.1 && Math.abs(t.col-tile.col+1)<0.1);
  return !leftBlocked || !rightBlocked;
}

// ══════════════════════════════════════════════════
//  RENDER BOARD
// ══════════════════════════════════════════════════
const EDGE=5, GAP=4;

function calcTileSize() {
  const wr = document.querySelector('.board-wrapper');
  const wW = wr.clientWidth - 20, wH = wr.clientHeight - 12;
  const maxL = G.tiles.reduce((m,t) => Math.max(m,t.layer), 0);
  const bleed = maxL * (EDGE + 4);
  // 2:3 ratio (width:height) — so height = width * 3/2, solve for width: width = height * 2/3
  const byW = Math.floor((wW - bleed) / (G.cols + 0.5 + maxL * 0.5));
  const byH = Math.floor((wH - bleed) / (G.rows + 0.5 + maxL * 0.5) * 2 / 3);
  return Math.max(16, Math.min(byW, byH));
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  const tW = calcTileSize();
  const tH = Math.floor(tW * 3 / 2);
  G.tileW = tW; G.tileH = tH;

  const allCols = G.tiles.map(t=>t.col), allRows = G.tiles.map(t=>t.row);
  const minC=Math.min(...allCols), maxC=Math.max(...allCols);
  const minR=Math.min(...allRows), maxR=Math.max(...allRows);
  boardEl.style.width  = ((maxC-minC+1)*(tW+GAP)+EDGE+8) + 'px';
  boardEl.style.height = ((maxR-minR+1)*(tH+GAP)+EDGE+8) + 'px';

  const sorted = [...G.tiles].filter(t=>!t.matched).sort((a,b)=>a.layer-b.layer||a.row-b.row||a.col-b.col);
  sorted.forEach(tile => {
    if (tile.inTray) return;
    const el = document.createElement('div');
    el.className = 'tile'; el.dataset.id = tile.id;
    el.style.left   = Math.round((tile.col-minC)*(tW+GAP)) + 'px';
    el.style.top    = Math.round((tile.row-minR)*(tH+GAP)) + 'px';
    el.style.width  = tW + 'px';
    el.style.height = tH + 'px';
    el.style.zIndex = tile.layer * 10 + 1;
    if (tile.faceDown && !tile.revealed) el.classList.add('face-down');
    if (tile.revealed) el.classList.add('revealed');
    const def = SUITS[tile.typeIndex];
    const symS = Math.max(8, Math.floor(tW*0.42)), crnS = Math.max(5, Math.floor(tW*0.16)), bkS = Math.floor(tW*0.38);
    el.innerHTML = `
      <div class="tile-inner">
        <div class="t-face">
          <span class="tile-corner" style="font-size:${crnS}px">${def.corner}</span>
          <span class="tile-symbol${def.red?' red-sym':''}" style="font-size:${symS}px">${def.sym}</span>
        </div>
        <div class="t-back"><span class="t-back-glyph" style="font-size:${bkS}px">水</span></div>
      </div>
      <div class="t-edge-r" style="top:${EDGE}px;right:-${EDGE}px;width:${EDGE}px;bottom:-${EDGE}px"></div>
      <div class="t-edge-b" style="bottom:-${EDGE}px;left:${EDGE}px;height:${EDGE}px;right:-${EDGE}px"></div>`;
    if (isTileFree(tile)) el.addEventListener('click', () => onTileClick(tile.id));
    tile.el = el;
    boardEl.appendChild(el);
  });
  renderTray();
  updateUI();
}

// ══════════════════════════════════════════════════
//  TRAY RENDER
// ══════════════════════════════════════════════════
function renderTray() {
  const trayEl = document.getElementById('tray');
  trayEl.innerHTML = '';
  trayEl.style.display = 'flex';
  trayEl.style.gap = '8px';
  trayEl.style.alignItems = 'center';
  const wr = document.querySelector('.board-wrapper');
  const maxW = wr.clientWidth - 28;
  const slotW = Math.min(60, Math.floor((maxW - 3*8) / 4));
  const slotH = Math.floor(slotW * 3 / 2);
  const symS = Math.max(8, Math.floor(slotW*0.40)), crnS = Math.max(5, Math.floor(slotW*0.15));
  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('div');
    slot.className = 'tray-slot';
    slot.style.width = slotW+'px'; slot.style.height = slotH+'px';
    const bg = document.createElement('div');
    bg.className = 'tray-slot-bg';
    bg.innerHTML = `<span class="tray-slot-num">${i+1}</span>`;
    slot.appendChild(bg);
    const item = G.tray[i];
    if (item) {
      const def = SUITS[item.typeIndex];
      const tt = document.createElement('div');
      tt.className = 'tray-tile';
      tt.innerHTML = `
        <div class="t-face">
          <span class="tile-corner" style="font-size:${crnS}px">${def.corner}</span>
          <span class="tile-symbol${def.red?' red-sym':''}" style="font-size:${symS}px">${def.sym}</span>
        </div>
        <div class="t-edge-r" style="top:${EDGE}px;right:-${EDGE}px;width:${EDGE}px;bottom:-${EDGE}px"></div>
        <div class="t-edge-b" style="bottom:-${EDGE}px;left:${EDGE}px;height:${EDGE}px;right:-${EDGE}px"></div>`;
      // NO click handler — tray is permanent
      slot.appendChild(tt);
    }
    trayEl.appendChild(slot);
  }
}

function packTray() {
  const items = G.tray.filter(Boolean);
  G.tray = [...items, ...Array(4-items.length).fill(null)];
}

// ══════════════════════════════════════════════════
//  FLYING TILE ANIMATION
// ══════════════════════════════════════════════════
function flyTileToTray(tile, targetSlotIndex, onDone) {
  const def = SUITS[tile.typeIndex];
  if (!tile.el) { onDone(); return; }

  const fromRect = tile.el.getBoundingClientRect();
  // Get target tray slot
  const traySlots = document.querySelectorAll('.tray-slot');
  if (!traySlots[targetSlotIndex]) { onDone(); return; }
  const toRect = traySlots[targetSlotIndex].getBoundingClientRect();

  // Hide source tile immediately
  tile.el.style.opacity = '0';

  const fly = document.createElement('div');
  fly.className = 'tile-fly' + (def.red ? ' red-sym-fly' : '');
  fly.style.width  = fromRect.width  + 'px';
  fly.style.height = fromRect.height + 'px';
  fly.style.left   = fromRect.left   + 'px';
  fly.style.top    = fromRect.top    + 'px';
  fly.style.fontSize = Math.max(8, Math.floor(fromRect.width * 0.42)) + 'px';
  fly.textContent = def.sym;
  document.body.appendChild(fly);

  const startX = fromRect.left, startY = fromRect.top;
  const endX   = toRect.left,   endY   = toRect.top;
  const startW = fromRect.width, startH = fromRect.height;
  const endW   = toRect.width,   endH   = toRect.height;

  const duration = 380;
  const startTime = performance.now();

  function step(now) {
    const p = Math.min(1, (now - startTime) / duration);
    const ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p; // easeInOut
    // Arc: lift halfway up
    const arcY = -60 * Math.sin(p * Math.PI);
    const x = startX + (endX - startX) * ease;
    const y = startY + (endY - startY) * ease + arcY;
    const w = startW + (endW - startW) * ease;
    const h = startH + (endH - startH) * ease;
    fly.style.left   = x + 'px';
    fly.style.top    = y + 'px';
    fly.style.width  = w + 'px';
    fly.style.height = h + 'px';
    fly.style.fontSize = Math.max(8, Math.floor(w * 0.42)) + 'px';
    fly.style.opacity = p > 0.85 ? (1-(p-0.85)/0.15).toString() : '1';
    if (p < 1) requestAnimationFrame(step);
    else { fly.remove(); onDone(); }
  }
  requestAnimationFrame(step);
}

// ══════════════════════════════════════════════════
//  TILE CLICK
// ══════════════════════════════════════════════════
function onTileClick(id) {
  const tile = G.tiles[id];
  if (!tile || tile.matched || tile.inTray) return;
  if (!isTileFree(tile)) { showToast('That tile is blocked'); return; }

  // Face-down: first tap reveals
  if (tile.faceDown && !tile.revealed) {
    if (G.revealedId !== null && G.revealedId !== id) flipBackRevealed();
    tile.revealed = true;
    tile.el && tile.el.classList.remove('face-down');
    tile.el && tile.el.classList.add('revealed');
    G.revealedId = id;
    return;
  }
  if (tile.revealed) { tile.revealed = false; G.revealedId = null; }
  if (G.revealedId !== null && G.revealedId !== id) flipBackRevealed();
  sendToTray(id);
}

function flipBackRevealed() {
  const prev = G.tiles[G.revealedId];
  if (prev && !prev.matched && !prev.inTray) {
    prev.revealed = false;
    prev.el && prev.el.classList.remove('revealed');
    prev.el && prev.el.classList.add('face-down');
  }
  G.revealedId = null;
}

// ══════════════════════════════════════════════════
//  SEND TO TRAY
// ══════════════════════════════════════════════════
function sendToTray(id) {
  const tile = G.tiles[id];
  if (G.tray.filter(Boolean).length >= 4) { showToast('Tray is full'); return; }
  tile.inTray  = true;
  tile.faceDown = false;
  const slotIdx = G.tray.findIndex(s => s === null);
  G.tray[slotIdx] = { typeIndex: tile.typeIndex, tileId: id };
  // Save undo
  G.undoStack.push({ typeIndex: tile.typeIndex, tileId: id, slotIdx });

  flyTileToTray(tile, slotIdx, () => {
    if (tile.el) { tile.el.remove(); tile.el = null; }
    refreshClickHandlers();
    renderTray();
    checkTrayMatch();
  });
}

// ══════════════════════════════════════════════════
//  CHECK TRAY MATCH
// ══════════════════════════════════════════════════
function checkTrayMatch() {
  const filled = G.tray.map((s,i)=>s?{...s,slot:i}:null).filter(Boolean);
  for (let a=0; a<filled.length; a++) {
    for (let b=a+1; b<filled.length; b++) {
      if (filled[a].typeIndex === filled[b].typeIndex) {
        const sA=filled[a].slot, sB=filled[b].slot;
        const slots = document.querySelectorAll('.tray-slot');
        const ttA = slots[sA]?.querySelector('.tray-tile');
        const ttB = slots[sB]?.querySelector('.tray-tile');
        if (ttA) ttA.classList.add('match-clear');
        if (ttB) ttB.classList.add('match-clear');
        setTimeout(() => {
          const tA=G.tiles[filled[a].tileId], tB=G.tiles[filled[b].tileId];
          // Get screen positions for particles before removing
          const rA = slots[sA]?.getBoundingClientRect();
          const rB = slots[sB]?.getBoundingClientRect();
          tA.matched=true; tA.inTray=false;
          tB.matched=true; tB.inTray=false;
          G.tray[sA]=null; G.tray[sB]=null;
          G.matchedPairs++;
          // Remove from undo stack
          G.undoStack = G.undoStack.filter(u => u.tileId!==filled[a].tileId && u.tileId!==filled[b].tileId);
          // Particles
          if (rA) spawnParticles(rA.left+rA.width/2, rA.top+rA.height/2);
          if (rB) spawnParticles(rB.left+rB.width/2, rB.top+rB.height/2);
          packTray();
          renderTray();
          refreshClickHandlers();
          updateUI();
          checkPowerupAward();
          checkWin();
        }, 330);
        return;
      }
    }
  }
  // No match — fail if full
  if (G.tray.filter(Boolean).length >= 4) {
    const ttEls = document.querySelectorAll('.tray-slot .tray-tile');
    ttEls.forEach(el => el.classList.add('danger-flash'));
    setTimeout(() => document.getElementById('fail-overlay').classList.remove('hidden'), 700);
  }
  updateUI();
}

// ══════════════════════════════════════════════════
//  REFRESH CLICK HANDLERS
// ══════════════════════════════════════════════════
function refreshClickHandlers() {
  G.tiles.forEach(t => {
    if (t.matched || t.inTray || !t.el) return;
    t.el.onclick = isTileFree(t) ? () => onTileClick(t.id) : null;
  });
}

// ══════════════════════════════════════════════════
//  WIN / STUCK
// ══════════════════════════════════════════════════
function checkWin() {
  if (G.matchedPairs >= G.totalPairs) {
    stopTimer();
    const elapsed = Math.floor((Date.now() - G.startTime) / 1000);
    showWin(elapsed);
    return;
  }
  const freeOnBoard = G.tiles.filter(t => !t.matched && !t.inTray && isTileFree(t));
  const trayItems   = G.tray.filter(Boolean);
  const hasTrayMatch = trayItems.some((a,i) => trayItems.slice(i+1).some(b=>a.typeIndex===b.typeIndex));
  if (freeOnBoard.length===0 && !hasTrayMatch && trayItems.length===0)
    setTimeout(() => document.getElementById('stuck-overlay').classList.remove('hidden'), 400);
}

function showWin(elapsed) {
  // Stars: <60s = 3, <120s = 2, else 1
  const stars = elapsed < 60 ? 3 : elapsed < 120 ? 2 : 1;
  const starStr = '★'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('win-stars').textContent = starStr;
  document.getElementById('win-time').textContent  = fmtTime(elapsed);
  // Personal best
  const bests = ls(SK.bests, {});
  const key   = String(G.level);
  const prev  = bests[key];
  let sub = '';
  if (!prev || elapsed < prev) {
    bests[key] = elapsed;
    lsSet(SK.bests, bests);
    sub = prev ? 'new best!' : 'first clear!';
    document.getElementById('win-best').textContent = fmtTime(elapsed);
  } else {
    document.getElementById('win-best').textContent = fmtTime(prev);
  }
  document.getElementById('win-sub').textContent = sub;
  setTimeout(() => document.getElementById('win-overlay').classList.remove('hidden'), 300);
}

function fmtTime(s) {
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

// ══════════════════════════════════════════════════
//  POWERUPS
// ══════════════════════════════════════════════════
function useHint() {
  if (G.powerups.hints <= 0) { showToast('No hints remaining'); return; }
  G.tiles.forEach(t => t.el && t.el.classList.remove('hint-glow'));
  const trayItems = G.tray.map((s,i)=>s?{...s,slot:i}:null).filter(Boolean);
  for (let a=0;a<trayItems.length;a++) for (let b=a+1;b<trayItems.length;b++) {
    if (trayItems[a].typeIndex===trayItems[b].typeIndex) {
      const slots = document.querySelectorAll('.tray-slot');
      [trayItems[a].slot,trayItems[b].slot].forEach(si => {
        const tt=slots[si]?.querySelector('.tray-tile');
        if (tt) { tt.classList.add('danger-flash'); setTimeout(()=>tt.classList.remove('danger-flash'),1500); }
      });
      G.powerups.hints--; savePersisted(); updatePowerupUI(); showToast('Match in your tray!'); return;
    }
  }
  const free = G.tiles.filter(t=>!t.matched&&!t.inTray&&isTileFree(t)&&!t.faceDown);
  for (let i=0;i<free.length;i++) for (let j=i+1;j<free.length;j++) {
    if (free[i].typeIndex===free[j].typeIndex) {
      [free[i],free[j]].forEach(t => {
        if (t.el) { t.el.classList.add('hint-glow'); setTimeout(()=>t.el&&t.el.classList.remove('hint-glow'),3000); }
      });
      G.powerups.hints--; savePersisted(); updatePowerupUI(); return;
    }
  }
  showToast('No visible moves — try a face-down tile');
}

function useShuffle() {
  if (G.powerups.shuffles <= 0) { showToast('No shuffles remaining'); return; }
  const rng = mulberry32(Date.now());
  const alive = G.tiles.filter(t=>!t.matched&&!t.inTray);
  const types = alive.map(t=>t.typeIndex);
  seededShuffle(types, rng);
  alive.forEach((t,i)=>{ t.typeIndex=types[i]; });
  G.powerups.shuffles--; savePersisted();
  renderBoard();
  showToast('Tiles shuffled');
}

function useUndo() {
  if (G.powerups.undos <= 0) { showToast('No undos remaining'); return; }
  if (G.undoStack.length === 0) { showToast('Nothing to undo'); return; }
  const last = G.undoStack.pop();
  const tile = G.tiles[last.tileId];
  tile.inTray = false;
  G.tray[last.slotIdx] = null;
  packTray();
  G.powerups.undos--; savePersisted();
  renderBoard(); // restores tile to board
  showToast('Tile returned to board');
}

function updatePowerupUI() {
  document.getElementById('cnt-hint').textContent    = G.powerups.hints;
  document.getElementById('cnt-shuffle').textContent = G.powerups.shuffles;
  document.getElementById('cnt-undo').textContent    = G.powerups.undos;
  const hDisabled = G.powerups.hints    <= 0;
  const sDisabled = G.powerups.shuffles <= 0;
  const uDisabled = G.powerups.undos    <= 0;
  document.getElementById('btn-hint').classList.toggle('disabled',    hDisabled);
  document.getElementById('btn-shuffle').classList.toggle('disabled', sDisabled);
  document.getElementById('btn-undo').classList.toggle('disabled',    uDisabled);
}

// ══════════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════════
const canvas = document.getElementById('particle-canvas');
const ctx    = canvas.getContext('2d');
let particles = [];
let animFrame = null;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnParticles(x, y) {
  const colors = ['#c9a84c','#e8dcc8','#c0392b','#6a9a4a','#8888cc'];
  for (let i = 0; i < 18; i++) {
    const angle = (Math.PI * 2 / 18) * i + (Math.random()-0.5)*0.4;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 2,
      life: 1, decay: 0.025 + Math.random()*0.02,
      size: 3 + Math.random()*4,
      color: colors[Math.floor(Math.random()*colors.length)],
    });
  }
  if (!animFrame) animateParticles();
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x  += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= p.decay;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  if (particles.length > 0) animFrame = requestAnimationFrame(animateParticles);
  else animFrame = null;
}

function updateUI() {
  document.getElementById('level-label').textContent  = `Level ${G.level}`;

function applyTheme(theme) {
  const gs = document.getElementById('game-screen');
  THEMES.forEach(t => gs.classList.remove(t.id));
  gs.classList.add(theme.id);
  G.theme = theme;
  document.getElementById('pause-theme-name').textContent = theme.name;
}

// ══════════════════════════════════════════════════
//  START LEVEL
// ══════════════════════════════════════════════════
function startLevel(level) {
  G.level = Math.max(1, level);

  // Powerup award check
  if (G.level >= G.nextPowerupLevel) {
    const amt = pickPowerupAmount(G.level);
    G.powerups.hints    += amt;
    G.powerups.shuffles += amt;
    G.powerups.undos    += amt;
    G.nextPowerupLevel   = pickNextPowerupLevel(G.level);
    // Show award toast after a short delay
    setTimeout(() => showPowerupToast(amt), 800);
  }

  savePersisted();

  const { tiles, cols, rows, totalPairs, theme } = generateLevel(G.level);
  G.tiles       = tiles;
  G.cols        = cols;
  G.rows        = rows;
  G.totalPairs  = totalPairs;
  G.matchedPairs = 0;
  G.tray        = [null,null,null,null];
  G.revealedId  = null;
  G.undoStack   = [];
  applyTheme(theme);

  ['win-overlay','stuck-overlay','fail-overlay','pause-overlay'].forEach(id =>
    document.getElementById(id).classList.add('hidden')
  );
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');

  startTimer();
  renderBoard();
}

function showPowerupToast(amt) {
  document.getElementById('pt-val').textContent = `+${amt}`;
  document.getElementById('pt-msg').textContent = `shuffle · hint · undo earned`;
  const el = document.getElementById('powerup-toast');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

  const el = document.getElementById('toast');
