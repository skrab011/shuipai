<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shui Pai">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0d1117">
<title>水牌 Shui Pai</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@300;400&display=swap');

:root {
  --bg:               #0d1117;
  --paper:            #e8dcc8;
  --paper-dim:        #9a8e78;
  --red:              #c0392b;
  --red-dark:         #7a1a12;
  --gold:             #c9a84c;
  --tile-face:        #c8b888;
  --tile-face-hi:     #d8c898;
  --tile-border:      #6a5428;
  --tile-edge-r:      #4a3818;
  --tile-edge-b:      #3a2c10;
  --tile-shadow:      rgba(0,0,0,0.7);
  --tile-back:        #2a3a50;
  --tile-back-hi:     #3a4f6a;
  --tile-back-border: #1a2a3a;
  --gold-glow:        #c9a84c;
  --tray-bg:          #0a0f18;
  --tray-border:      #1e2d42;
  --edge-w:           5px;
  --radius:           12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--paper);
  overflow: hidden;
  touch-action: manipulation;
  -webkit-font-smoothing: antialiased;
}
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.screen.hidden { display: none; }

/* ═══ TITLE ═══ */
#title-screen { background: var(--bg); }
.title-art { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.title-kanji {
  font-family: 'Noto Serif SC', serif; font-weight: 900;
  font-size: clamp(84px, 22vw, 110px);
  color: var(--paper); line-height: 1; letter-spacing: -0.02em;
  text-shadow: 5px 6px 0 var(--red-dark), 0 0 50px rgba(192,57,43,0.25);
}
.title-pinyin {
  font-size: 11px; font-weight: 300; letter-spacing: 0.38em;
  text-transform: uppercase; color: var(--paper-dim);
}
.title-rule { width: 44px; height: 1px; background: var(--gold); opacity: 0.45; margin: 16px 0 12px; }
.title-sub { font-size: 10px; color: var(--paper-dim); letter-spacing: 0.2em; opacity: 0.55; }
.title-preview { display: flex; gap: 12px; margin: 28px 0 32px; }
.ptile {
  position: relative; width: 50px; height: 66px;
  animation: float 3s ease-in-out infinite;
}
.ptile:nth-child(2){animation-delay:.5s}
.ptile:nth-child(3){animation-delay:1s}
.ptile:nth-child(4){animation-delay:1.5s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ptile .t-face {
  position: absolute; inset: 0;
  background: linear-gradient(145deg, var(--tile-face-hi) 0%, var(--tile-face) 100%);
  border: 2px solid var(--tile-border); border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif SC', serif; font-size: 26px; font-weight: 900;
  color: #2a1a04; box-shadow: 3px 4px 12px var(--tile-shadow); z-index: 2;
}
.ptile .t-edge-r {
  position: absolute; top: var(--edge-w); right: calc(-1 * var(--edge-w));
  width: var(--edge-w); bottom: calc(-1 * var(--edge-w));
  background: var(--tile-edge-r); border-radius: 0 4px 4px 0; z-index: 1;
}
.ptile .t-edge-b {
  position: absolute; bottom: calc(-1 * var(--edge-w)); left: var(--edge-w);
  height: var(--edge-w); right: calc(-1 * var(--edge-w));
  background: var(--tile-edge-b); border-radius: 0 0 4px 4px; z-index: 1;
}
.btn-primary {
  background: var(--red); color: var(--paper);
  border: none; border-radius: var(--radius);
  padding: 14px 52px;
  font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700;
  letter-spacing: 0.18em; cursor: pointer;
  box-shadow: 0 4px 22px rgba(192,57,43,0.45);
  transition: transform .1s; -webkit-tap-highlight-color: transparent;
}
.btn-primary:active { transform: scale(0.97); }
.level-display { margin-top: 16px; font-size: 11px; color: var(--paper-dim); letter-spacing: 0.14em; opacity: 0.5; }

/* ═══ GAME SCREEN ═══ */
#game-screen { background: var(--bg); justify-content: flex-start; }

.top-bar {
  width: 100%; display: flex; align-items: center;
  justify-content: space-between; padding: 10px 14px 6px; flex-shrink: 0;
}
.top-bar-left { display: flex; flex-direction: column; }
.level-label {
  font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700;
  color: var(--paper); letter-spacing: 0.05em;
}
.pairs-label { font-size: 10px; color: var(--paper-dim); letter-spacing: 0.1em; margin-top: 1px; }
.top-bar-right { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: var(--paper);
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background .15s;
}
.icon-btn:active { background: rgba(255,255,255,0.14); }

/* ═══ TRAY ═══ */
.tray-section {
  width: 100%; flex-shrink: 0;
  padding: 2px 14px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.tray-label {
  font-size: 9px; color: var(--paper-dim); letter-spacing: 0.18em;
  text-transform: uppercase; opacity: 0.45; align-self: center;
}
.tray {
  display: flex; gap: 8px;
  justify-content: center; align-items: center;
}
.tray-slot {
  flex-shrink: 0;
  position: relative;
}
.tray-slot-bg {
  position: absolute; inset: 0;
  background: var(--tray-bg);
  border: 1.5px dashed var(--tray-border);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
}
.tray-slot-num { font-size: 10px; color: var(--tray-border); opacity: 0.4; }
.tray-tile {
  position: absolute; inset: 0;
}
.tray-tile .t-face {
  position: absolute; inset: 0;
  background: linear-gradient(145deg, var(--tile-face-hi) 0%, var(--tile-face) 100%);
  border: 2px solid var(--tile-border);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  z-index: 2; overflow: hidden;
}
.tray-tile .t-face::before {
  content: ''; position: absolute; inset: 3px;
  border-radius: calc(var(--radius) - 3px);
  border: 1px solid rgba(255,255,255,0.15); pointer-events: none;
}
.tray-tile .t-edge-r {
  position: absolute; top: var(--edge-w); right: calc(-1 * var(--edge-w));
  width: var(--edge-w); bottom: calc(-1 * var(--edge-w));
  background: var(--tile-edge-r); border-radius: 0 4px 4px 0; z-index: 1;
}
.tray-tile .t-edge-b {
  position: absolute; bottom: calc(-1 * var(--edge-w)); left: var(--edge-w);
  height: var(--edge-w); right: calc(-1 * var(--edge-w));
  background: var(--tile-edge-b); border-radius: 0 0 4px 4px; z-index: 1;
}
.tray-tile.match-clear { animation: match-out .35s ease-in forwards; }
.tray-tile.danger-flash { animation: danger-shake .5s ease-in-out; }
@keyframes danger-shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)}
  40%{transform:translateX(4px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(2px)}
}

/* ═══ PROGRESS ═══ */
.progress-bar-wrap {
  width: calc(100% - 28px); height: 2px;
  background: rgba(255,255,255,0.07); border-radius: 2px;
  margin: 0 14px 4px; flex-shrink: 0;
}
.progress-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .4s ease; }

/* ═══ BOARD ═══ */
.board-wrapper {
  flex: 1; width: 100%;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; padding: 4px 10px 8px; position: relative;
}
#board { position: relative; }

/* ═══ 3D TILE ═══ */
.tile {
  position: absolute; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.tile-inner {
  position: absolute; inset: 0;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(.4,0,.2,1);
}
.tile.face-down .tile-inner { transform: rotateY(180deg); }

.t-face {
  position: absolute; inset: 0;
  background: linear-gradient(145deg, var(--tile-face-hi) 0%, var(--tile-face) 60%);
  border: 2px solid var(--tile-border); border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  backface-visibility: hidden; z-index: 2; overflow: hidden;
}
.t-face::before {
  content: ''; position: absolute; inset: 3px;
  border-radius: calc(var(--radius) - 3px);
  border: 1px solid rgba(255,255,255,0.18); pointer-events: none;
}
.t-back {
  position: absolute; inset: 0;
  background: linear-gradient(145deg, var(--tile-back-hi) 0%, var(--tile-back) 60%);
  border: 2px solid var(--tile-back-border); border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  backface-visibility: hidden; transform: rotateY(180deg); z-index: 2;
}
.t-back::before {
  content: ''; position: absolute; inset: 4px;
  border-radius: calc(var(--radius) - 4px);
  border: 1px solid rgba(255,255,255,0.07);
  background: repeating-linear-gradient(
    45deg, transparent, transparent 4px,
    rgba(255,255,255,0.03) 4px, rgba(255,255,255,0.03) 5px
  );
  pointer-events: none;
}
.t-back-glyph {
  font-family: 'Noto Serif SC', serif; font-weight: 900;
  color: rgba(255,255,255,0.1); pointer-events: none; user-select: none;
}
.t-edge-r {
  position: absolute;
  background: linear-gradient(to right, var(--tile-edge-r), var(--tile-edge-b));
  border-radius: 0 5px 5px 0; z-index: 1;
}
.t-edge-b {
  position: absolute;
  background: linear-gradient(to bottom, var(--tile-edge-b), #28200a);
  border-radius: 0 0 5px 5px; z-index: 1;
}
.tile-symbol {
  font-family: 'Noto Serif SC', serif; font-weight: 900;
  line-height: 1; color: #1e1004;
  pointer-events: none; user-select: none;
}
.tile-symbol.red-sym { color: var(--red-dark); }
.tile-corner {
  position: absolute; top: 4px; left: 5px;
  font-family: 'Noto Serif SC', serif; font-weight: 700;
  color: #1e1004; opacity: 0.4;
  pointer-events: none; user-select: none;
}

/* hint state */
.tile.hint-glow .t-face {
  background: linear-gradient(145deg, #e8d898 0%, #c8b860 60%);
  border-color: var(--gold);
  box-shadow: 0 0 0 2px var(--gold);
  animation: hint-pulse 1s ease-in-out 3;
}
@keyframes hint-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

/* revealed */
.tile.revealed .t-face {
  border-color: var(--gold);
  box-shadow: 0 0 0 1.5px var(--gold);
}
/* match clear */
.tile.match-clear {
  animation: match-out .32s ease-in forwards; z-index: 200;
}
@keyframes match-out {
  0%   { transform: scale(1.05); opacity: 1; }
  50%  { transform: scale(1.12); opacity: 0.6; }
  100% { transform: scale(0.2); opacity: 0; }
}

/* ═══ OVERLAYS ═══ */
.overlay {
  position: absolute; inset: 0;
  background: rgba(10,14,20,0.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; z-index: 100; backdrop-filter: blur(5px);
}
.overlay.hidden { display: none; }
.overlay-kanji {
  font-family: 'Noto Serif SC', serif; font-weight: 900;
  font-size: clamp(80px, 22vw, 112px); color: var(--paper);
  text-shadow: 5px 6px 0 var(--red-dark);
  animation: pop-in .4s cubic-bezier(.34,1.56,.64,1) both;
}
.overlay-kanji.win { color: #c0f0a0; text-shadow: 5px 6px 0 #1a5010; }
@keyframes pop-in{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.overlay-sub { font-size: 12px; color: var(--paper-dim); letter-spacing: 0.22em; margin-bottom: 6px; text-align: center; line-height: 1.6; }
.overlay-btns { display: flex; gap: 12px; }
.btn-sec {
  background: transparent; color: var(--paper);
  border: 1px solid rgba(255,255,255,0.22); border-radius: 8px;
  padding: 11px 24px;
  font-family: 'Noto Sans SC', sans-serif; font-size: 12px; letter-spacing: 0.1em;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .15s;
}
.btn-sec:active { background: rgba(255,255,255,0.1); }

#toast {
  position: fixed; bottom: 34px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: rgba(10,14,20,0.95); border: 1px solid var(--gold);
  color: var(--paper); padding: 9px 18px; border-radius: 8px;
  font-size: 12px; letter-spacing: 0.1em;
  opacity: 0; transition: opacity .3s, transform .3s;
  pointer-events: none; z-index: 200; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══ THEMES ═══ */
body.dark-theme {
  --bg: #1c1c1e;
  --paper: #d1d1d6;
  --tile-face: #3a3a3c;
  --tile-face-hi: #48484a;
  --tile-border: #636366;
  --tile-edge-r: #2c2c2e;
  --tile-edge-b: #1c1c1e;
  --red: #ff453a;
  --red-dark: #ff3b30;
  --gold: #ffcc00;
}
body.dark-theme .tile-symbol { color: #f2f2f7; }
body.dark-theme .tile-corner { color: #aeaeb2; }
</style>
</head>
<body>

<div id="title-screen" class="screen">
  <div class="title-art">
    <div class="title-kanji">水牌</div>
    <div class="title-pinyin">Shui Pái</div>
    <div class="title-rule"></div>
    <div class="title-sub">tile matching</div>
  </div>
  <div class="title-preview">
    <div class="ptile"><div class="t-face">竹</div><div class="t-edge-r"></div><div class="t-edge-b"></div></div>
    <div class="ptile"><div class="t-face">風</div><div class="t-edge-r"></div><div class="t-edge-b"></div></div>
    <div class="ptile"><div class="t-face" style="color:#7a1a12">花</div><div class="t-edge-r"></div><div class="t-edge-b"></div></div>
    <div class="ptile"><div class="t-face">龍</div><div class="t-edge-r"></div><div class="t-edge-b"></div></div>
  </div>
  <button class="btn-primary" id="start-btn">開始</button>
  <div class="level-display" id="title-level">Level 1</div>
</div>

<div id="game-screen" class="screen hidden">
  <div class="tray-section" style="padding-top: 16px;">
    <div class="tray-label">holding tray</div>
    <div class="tray" id="tray"></div>
  </div>

  <div class="top-bar">
    <div class="top-bar-left">
      <div class="level-label" id="level-label">Level 1</div>
      <div class="pairs-label" id="pairs-label">— pairs remaining</div>
    </div>
    <div class="top-bar-right">
      <div class="icon-btn" id="menu-btn">⏸️</div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="board-wrapper">
    <div id="board"></div>
  </div>

  <div class="bottom-bar" style="display: flex; gap: 16px; padding: 0 14px 24px; justify-content: center; width: 100%;">
    <button class="btn-sec" id="hint-btn">💡 Hint</button>
    <button class="btn-sec" id="shuffle-btn">🔀 Shuffle</button>
    <button class="btn-sec" id="undo-btn">↩️ Undo</button>
  </div>

  <div class="overlay hidden" id="win-overlay">
    <div class="overlay-kanji win">勝</div>
    <div class="overlay-sub" id="win-summary">level complete</div>
    <div class="overlay-btns"><button class="btn-sec" id="next-btn">Next Level →</button></div>
  </div>
  
  <div class="overlay hidden" id="pause-overlay">
    <div class="overlay-kanji">停</div>
    <div class="overlay-sub">paused</div>
    <div class="overlay-btns" style="flex-direction: column; gap: 8px;">
      <button class="btn-sec" id="resume-btn">Resume</button>
      <button class="btn-sec" id="theme-btn">Toggle Theme</button>
      <button class="btn-sec" id="quit-btn">Quit to Title</button>
    </div>
  </div>

  <div class="overlay hidden" id="stuck-overlay">
    <div class="overlay-kanji">止</div>
    <div class="overlay-sub">no moves remain</div>
    <div class="overlay-btns">
      <button class="btn-sec" id="stuck-shuffle-btn">Shuffle</button>
      <button class="btn-sec" id="restart-btn">Restart</button>
    </div>
  </div>

  <div class="overlay hidden" id="fail-overlay">
    <div class="overlay-kanji">敗</div>
    <div class="overlay-sub">tray is full — no match</div>
    <div class="overlay-btns"><button class="btn-sec" id="fail-restart-btn">Try Again</button></div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

const SUITS = [
  {sym:'一',corner:'萬',red:false},{sym:'二',corner:'萬',red:false},{sym:'三',corner:'萬',red:false},
  {sym:'四',corner:'萬',red:false},{sym:'五',corner:'萬',red:false},{sym:'六',corner:'萬',red:false},
  {sym:'七',corner:'萬',red:false},{sym:'八',corner:'萬',red:false},{sym:'九',corner:'萬',red:false},
  {sym:'竹',corner:'木',red:false},{sym:'林',corner:'木',red:false},{sym:'森',corner:'木',red:false},
  {sym:'梅',corner:'木',red:false},{sym:'松',corner:'木',red:false},{sym:'柳',corner:'木',red:false},
  {sym:'桃',corner:'木',red:false},{sym:'菊',corner:'木',red:false},{sym:'蘭',corner:'木',red:false},
  {sym:'日',corner:'天',red:false},{sym:'月',corner:'天',red:false},{sym:'星',corner:'天',red:false},
  {sym:'雲',corner:'天',red:false},{sym:'雪',corner:'天',red:false},{sym:'風',corner:'天',red:false},
  {sym:'雷',corner:'天',red:true },{sym:'霧',corner:'天',red:false},{sym:'霜',corner:'天',red:false},
  {sym:'火',corner:'元',red:true },{sym:'水',corner:'元',red:false},{sym:'土',corner:'元',red:false},
  {sym:'木',corner:'元',red:false},{sym:'金',corner:'元',red:true },{sym:'氣',corner:'元',red:false},
  {sym:'東',corner:'風',red:true },{sym:'南',corner:'風',red:true },
  {sym:'西',corner:'風',red:true },{sym:'北',corner:'風',red:true },
  {sym:'中',corner:'龍',red:true },{sym:'發',corner:'龍',red:false},{sym:'白',corner:'龍',red:false},
  {sym:'鳥',corner:'獸',red:false},{sym:'魚',corner:'獸',red:false},{sym:'龜',corner:'獸',red:false},
  {sym:'鶴',corner:'獸',red:false},{sym:'蝶',corner:'獸',red:true },{sym:'虎',corner:'獸',red:true },
  {sym:'花',corner:'季',red:true },{sym:'春',corner:'季',red:false},
  {sym:'夏',corner:'季',red:false},{sym:'秋',corner:'季',red:true },
  {sym:'冬',corner:'季',red:false},{sym:'蓮',corner:'季',red:true },
  {sym:'山',corner:'地',red:false},{sym:'川',corner:'地',red:false},{sym:'海',corner:'地',red:false},
  {sym:'島',corner:'地',red:false},{sym:'谷',corner:'地',red:false},{sym:'峰',corner:'地',red:false},
  {sym:'天',corner:'宙',red:false},{sym:'地',corner:'宙',red:false},{sym:'宙',corner:'宙',red:false},
  {sym:'光',corner:'宙',red:true },{sym:'影',corner:'宙',red:false},{sym:'空',corner:'宙',red:false},
  {sym:'福',corner:'德',red:true },{sym:'壽',corner:'德',red:false},{sym:'祿',corner:'德',red:true },
  {sym:'仁',corner:'德',red:false},{sym:'義',corner:'德',red:false},{sym:'禮',corner:'德',red:false},
];

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildLayout(level) {
  const positions = [];
  const cols = level <= 3 ? 6 : level <= 10 ? 8 : level <= 20 ? 10 : 12;
  const rows = level <= 3 ? 5 : level <= 10 ? 6 : level <= 20 ? 7  : 8;
  const maxLayers = level <= 5 ? 1 : level <= 15 ? 2 : level <= 30 ? 3 : 4;

  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      positions.push({ col: c, row: r, layer: 0 });

  for (let l = 1; l < maxLayers; l++) {
    const offset = l * 0.5;
    const cStart = offset;
    const cEnd   = cols - 1 - offset;
    const rStart = offset;
    const rEnd   = rows - 1 - offset;
    for (let r = rStart; r <= rEnd; r++) {
      for (let c = cStart; c <= cEnd; c++) {
        positions.push({ col: c, row: r, layer: l });
      }
    }
  }
  return { positions, cols, rows };
}

const STORAGE_KEY = 'shuipai_level_v2';
let G = {
  level: 1,
  tiles: [],
  tray: [],
  history: [],
  startTime: 0,
  totalPairs: 0,
  matchedPairs: 0,
  cols: 0, rows: 0,
  tileW: 0, tileH: 0,
  revealedId: null,
};

(function loadSaved() {
  try {
    const v = parseInt(localStorage.getItem(STORAGE_KEY) || '1', 10);
    G.level = (!isNaN(v) && v >= 1) ? v : 1;
  } catch(e) { G.level = 1; }
})();

function saveLevel() {
  try { localStorage.setItem(STORAGE_KEY, String(G.level)); } catch(e) {}
}

function generateLevel(level) {
  const rng = mulberry32(level * 2654435761 + 987654321);
  const { positions, cols, rows } = buildLayout(level);
  const total = positions.length;
  const pairs = Math.floor(total / 2);
  const usedCount = pairs * 2;

  const typeCount = SUITS.length;
  const pool = Array.from({ length: pairs }, (_, i) => i % typeCount);
  const types = [];
  pool.forEach(t => { types.push(t); types.push(t); });
  seededShuffle(types, rng);

  const faceDownRatio = Math.min(0.5, Math.max(0, (level - 5) * 0.04));

  const tiles = positions.slice(0, usedCount).map((pos, i) => ({
    id: i,
    col: pos.col,
    row: pos.row,
    layer: pos.layer,
    typeIndex: types[i],
    matched: false,
    inTray: false,
    faceDown: rng() < faceDownRatio,
    revealed: false,
    el: null,
  }));

  return { tiles, cols, rows, totalPairs: pairs };
}

function tilesOverlap(colA, rowA, colB, rowB) {
  return Math.abs(colA - colB) < 1 && Math.abs(rowA - rowB) < 1;
}

function isTileFree(tile) {
  if (tile.matched || tile.inTray) return false;

  const hasAbove = G.tiles.some(t =>
    !t.matched && !t.inTray &&
    t.layer === tile.layer + 1 &&
    tilesOverlap(t.col, t.row, tile.col, tile.row)
  );
  if (hasAbove) return false;

  const leftBlocked = G.tiles.some(t =>
    !t.matched && !t.inTray &&
    t.layer === tile.layer &&
    Math.abs(t.row - tile.row) < 0.1 &&
    Math.abs(t.col - tile.col - 1) < 0.1
  );
  const rightBlocked = G.tiles.some(t =>
    !t.matched && !t.inTray &&
    t.layer === tile.layer &&
    Math.abs(t.row - tile.row) < 0.1 &&
    Math.abs(t.col - tile.col + 1) < 0.1
  );

  return !leftBlocked || !rightBlocked;
}

const EDGE = 5;
const GAP  = 4;

function calcTileSize() {
  const wrapper = document.querySelector('.board-wrapper');
  const wW = wrapper.clientWidth - 20;
  const wH = wrapper.clientHeight - 12;
  const maxLayer = G.tiles.reduce((m, t) => Math.max(m, t.layer), 0);
  const bleedX = maxLayer * EDGE + maxLayer * 4;
  const bleedY = maxLayer * EDGE + maxLayer * 4;
  const byW = Math.floor((wW - bleedX) / (G.cols + 0.5 + (maxLayer * 0.5)));
  const byH = Math.floor((wH - bleedY) / (G.rows + 0.5 + (maxLayer * 0.5)) * 3 / 4);
  return { tileW: Math.max(16, Math.min(byW, byH)), tileH: 0 };
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  const { tileW } = calcTileSize();
  const tileH = Math.floor(tileW * 4 / 3);
  G.tileW = tileW; G.tileH = tileH;

  const allCols = G.tiles.map(t => t.col);
  const allRows = G.tiles.map(t => t.row);
  const minC = Math.min(...allCols), maxC = Math.max(...allCols);
  const minR = Math.min(...allRows), maxR = Math.max(...allRows);
  const bW = (maxC - minC + 1) * (tileW + GAP) + EDGE + 8;
  const bH = (maxR - minR + 1) * (tileH + GAP) + EDGE + 8;
  boardEl.style.width  = bW + 'px';
  boardEl.style.height = bH + 'px';

  const sorted = [...G.tiles]
    .filter(t => !t.matched)
    .sort((a, b) => a.layer - b.layer || a.row - b.row || a.col - b.col);

  sorted.forEach(tile => {
    if (tile.inTray) return;

    const el = document.createElement('div');
    el.className = 'tile';
    el.dataset.id = tile.id;

    const px = (tile.col - minC) * (tileW + GAP);
    const py = (tile.row - minR) * (tileH + GAP);
    el.style.left   = Math.round(px) + 'px';
    el.style.top    = Math.round(py) + 'px';
    el.style.width  = tileW + 'px';
    el.style.height = tileH + 'px';
    el.style.zIndex = tile.layer * 10 + 1;

    if (tile.faceDown && !tile.revealed) el.classList.add('face-down');
    if (tile.revealed) el.classList.add('revealed');

    const def = SUITS[tile.typeIndex];
    const symSize  = Math.max(10, Math.floor(tileW * 0.56));
    const crnSize  = Math.max(6,  Math.floor(tileW * 0.17));
    const backSize = Math.floor(tileW * 0.52);

    el.innerHTML = `
      <div class="tile-inner">
        <div class="t-face">
          <span class="tile-corner" style="font-size:${crnSize}px">${def.corner}</span>
          <span class="tile-symbol${def.red?' red-sym':''}" style="font-size:${symSize}px">${def.sym}</span>
        </div>
        <div class="t-back">
          <span class="t-back-glyph" style="font-size:${backSize}px">水</span>
        </div>
      </div>
      <div class="t-edge-r" style="top:${EDGE}px;right:-${EDGE}px;width:${EDGE}px;bottom:-${EDGE}px;border-radius:0 5px 5px 0"></div>
      <div class="t-edge-b" style="bottom:-${EDGE}px;left:${EDGE}px;height:${EDGE}px;right:-${EDGE}px;border-radius:0 0 5px 5px"></div>`;

    const free = isTileFree(tile);
    if (free) el.addEventListener('click', () => onTileClick(tile.id));

    tile.el = el;
    boardEl.appendChild(el);
  });

  renderTray();
  updateUI();
}

function renderTray() {
  const trayEl = document.getElementById('tray');
  trayEl.innerHTML = '';

  const wrapper = document.querySelector('.board-wrapper');
  const maxW = wrapper.clientWidth - 28;
  const slotW = Math.min(64, Math.floor((maxW - 3 * 8) / 4));
  const slotH = Math.floor(slotW * 4 / 3);
  const symSize  = Math.max(10, Math.floor(slotW * 0.50));
  const crnSize  = Math.max(6,  Math.floor(slotW * 0.16));

  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('div');
    slot.className = 'tray-slot';
    slot.style.width  = slotW + 'px';
    slot.style.height = slotH + 'px';

    const bg = document.createElement('div');
    bg.className = 'tray-slot-bg';
    bg.innerHTML = `<span class="tray-slot-num">${i+1}</span>`;
    slot.appendChild(bg);

    const item = G.tray[i];
    if (item) {
      const def = SUITS[item.typeIndex];
      const tt = document.createElement('div');
      tt.className = 'tray-tile';
      tt.innerHTML = `
        <div class="t-face">
          <span class="tile-corner" style="font-size:${crnSize}px">${def.corner}</span>
          <span class="tile-symbol${def.red?' red-sym':''}" style="font-size:${symSize}px">${def.sym}</span>
        </div>
        <div class="t-edge-r" style="top:${EDGE}px;right:-${EDGE}px;width:${EDGE}px;bottom:-${EDGE}px"></div>
        <div class="t-edge-b" style="bottom:-${EDGE}px;left:${EDGE}px;height:${EDGE}px;right:-${EDGE}px"></div>`;
      slot.appendChild(tt);
    }

    trayEl.appendChild(slot);
  }
}

function packTray() {
  const items = G.tray.filter(Boolean);
  G.tray = [...items, ...Array(4 - items.length).fill(null)];
}

function onTileClick(id) {
  const tile = G.tiles[id];
  if (!tile || tile.matched || tile.inTray) return;
  if (!isTileFree(tile)) { showToast('That tile is blocked'); return; }

  if (tile.faceDown && !tile.revealed) {
    if (G.revealedId !== null && G.revealedId !== id) {
      const prev = G.tiles[G.revealedId];
      if (prev && !prev.matched && !prev.inTray) {
        prev.revealed = false;
        prev.el && prev.el.classList.remove('revealed');
        prev.el && prev.el.classList.add('face-down');
      }
      G.revealedId = null;
    }
    tile.revealed = true;
    tile.el && tile.el.classList.remove('face-down');
    tile.el && tile.el.classList.add('revealed');
    G.revealedId = id;
    return;
  }

  if (tile.revealed) {
    tile.revealed = false;
    G.revealedId = null;
  }
  if (G.revealedId !== null && G.revealedId !== id) {
    const prev = G.tiles[G.revealedId];
    if (prev && !prev.matched && !prev.inTray) {
      prev.revealed = false;
      prev.el && prev.el.classList.remove('revealed');
      prev.el && prev.el.classList.add('face-down');
    }
    G.revealedId = null;
  }

  sendToTray(id);
}

function sendToTray(id) {
  const tile = G.tiles[id];
  if (G.tray.filter(Boolean).length >= 4) {
    showToast('Tray is full');
    return;
  }
  
  const emptySlot = G.tray.findIndex(s => s === null);
  
  if (tile.el) {
    const slotEls = document.querySelectorAll('.tray-slot');
    const slotRect = slotEls[emptySlot].getBoundingClientRect();
    const tileRect = tile.el.getBoundingClientRect();
    
    const dx = slotRect.left - tileRect.left;
    const dy = slotRect.top - tileRect.top;
    
    tile.el.style.zIndex = '999';
    tile.el.style.transition = 'transform 0.25s ease-in, opacity 0.25s ease-in';
    tile.el.style.transform = `translate(${dx}px, ${dy}px) scale(0.6)`;
  }

  setTimeout(() => {
    tile.inTray = true;
    tile.faceDown = false;
    G.history.push(id); 
    
    if (tile.el) { tile.el.remove(); tile.el = null; }
    
    G.tray[emptySlot] = { typeIndex: tile.typeIndex, tileId: id };

    refreshClickHandlers();
    renderTray();
    checkTrayMatch();
  }, 250);
}

function undoLastMove() {
  if (G.history.length === 0) { showToast('Nothing to undo'); return; }
  const lastId = G.history.pop();
  const tile = G.tiles[lastId];
  
  const slotIdx = G.tray.findIndex(s => s && s.tileId === lastId);
  if (slotIdx !== -1) G.tray[slotIdx] = null;
  
  tile.inTray = false;
  packTray();
  renderTray();
  renderBoard(); 
}

function createParticles(element) {
  if (!element) return;
  const rect = element.getBoundingClientRect();
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.style.position = 'absolute';
    p.style.left = `${rect.left + rect.width / 2}px`;
    p.style.top = `${rect.top + rect.height / 2}px`;
    p.style.width = '6px'; p.style.height = '6px';
    p.style.backgroundColor = 'var(--gold)';
    p.style.borderRadius = '50%';
    p.style.pointerEvents = 'none'; p.style.zIndex = '1000';
    
    const angle = Math.random() * Math.PI * 2;
    const velocity = Math.random() * 50 + 20;
    const tx = Math.cos(angle) * velocity; const ty = Math.sin(angle) * velocity;
    
    p.style.transition = 'transform 0.6s ease-out, opacity 0.6s ease-out';
    document.body.appendChild(p);
    
    requestAnimationFrame(() => {
      p.style.transform = `translate(${tx}px, ${ty}px) scale(0)`;
      p.style.opacity = '0';
    });
    setTimeout(() => p.remove(), 600);
  }
}

function checkTrayMatch() {
  const filled = G.tray
    .map((s, i) => s ? { ...s, slot: i } : null)
    .filter(Boolean);

  for (let a = 0; a < filled.length; a++) {
    for (let b = a + 1; b < filled.length; b++) {
      if (filled[a].typeIndex === filled[b].typeIndex) {
        const slotA = filled[a].slot, slotB = filled[b].slot;
        const slotEls = document.querySelectorAll('.tray-slot');
        const ttA = slotEls[slotA]?.querySelector('.tray-tile');
        const ttB = slotEls[slotB]?.querySelector('.tray-tile');
        if (ttA) ttA.classList.add('match-clear');
        if (ttB) ttB.classList.add('match-clear');

        setTimeout(() => {
          createParticles(slotEls[slotA]);
          createParticles(slotEls[slotB]);
          
          G.history = G.history.filter(id => id !== filled[a].tileId && id !== filled[b].tileId);

          const tA = G.tiles[filled[a].tileId];
          const tB = G.tiles[filled[b].tileId];
          tA.matched = true; tA.inTray = false;
          tB.matched = true; tB.inTray = false;
          G.tray[slotA] = null;
          G.tray[slotB] = null;
          G.matchedPairs++;
          packTray();
          renderTray();
          refreshClickHandlers();
          updateUI();
          checkWin();
        }, 330);
        return;
      }
    }
  }

  if (G.tray.filter(Boolean).length >= 4) {
    const ttEls = document.querySelectorAll('.tray-slot .tray-tile');
    ttEls.forEach(el => el.classList.add('danger-flash'));
    setTimeout(() => {
      document.getElementById('fail-overlay').classList.remove('hidden');
    }, 700);
  }
  updateUI();
}

function refreshClickHandlers() {
  G.tiles.forEach(t => {
    if (t.matched || t.inTray || !t.el) return;
    t.el.onclick = isTileFree(t) ? () => onTileClick(t.id) : null;
  });
}

function checkWin() {
  if (G.matchedPairs >= G.totalPairs) {
    setTimeout(() => {
      const timeTaken = Math.floor((Date.now() - G.startTime) / 1000);
      const mins = Math.floor(timeTaken / 60);
      const secs = timeTaken % 60;
      let rating = "⭐⭐⭐";
      if (timeTaken > G.totalPairs * 4) rating = "⭐⭐";
      if (timeTaken > G.totalPairs * 8) rating = "⭐";
      
      document.getElementById('win-summary').innerHTML = 
        `Time: ${mins}:${secs.toString().padStart(2, '0')}<br>Rating: ${rating}`;
        
      document.getElementById('win-overlay').classList.remove('hidden');
    }, 300);
    return;
  }
  const freeOnBoard = G.tiles.filter(t => !t.matched && !t.inTray && isTileFree(t));
  const trayItems = G.tray.filter(Boolean);
  const hasTrayMatch = trayItems.some((a, i) =>
    trayItems.slice(i + 1).some(b => a.typeIndex === b.typeIndex)
  );
  if (freeOnBoard.length === 0 && !hasTrayMatch && trayItems.length === 0) {
    setTimeout(() => document.getElementById('stuck-overlay').classList.remove('hidden'), 400);
  }
}

function showHint() {
  G.tiles.forEach(t => t.el && t.el.classList.remove('hint-glow'));
  const trayItems = G.tray.map((s, i) => s ? { ...s, slot: i } : null).filter(Boolean);
  for (let a = 0; a < trayItems.length; a++) {
    for (let b = a + 1; b < trayItems.length; b++) {
      if (trayItems[a].typeIndex === trayItems[b].typeIndex) {
        const slots = document.querySelectorAll('.tray-slot');
        [trayItems[a].slot, trayItems[b].slot].forEach(si => {
          const tt = slots[si]?.querySelector('.tray-tile');
          if (tt) { tt.classList.add('danger-flash'); setTimeout(() => tt.classList.remove('danger-flash'), 1500); }
        });
        showToast('Match in your tray!');
        return;
      }
    }
  }
  const free = G.tiles.filter(t => !t.matched && !t.inTray && isTileFree(t) && !t.faceDown);
  for (let i = 0; i < free.length; i++) {
    for (let j = i + 1; j < free.length; j++) {
      if (free[i].typeIndex === free[j].typeIndex) {
        [free[i], free[j]].forEach(t => {
          if (t.el) {
            t.el.classList.add('hint-glow');
            setTimeout(() => t.el && t.el.classList.remove('hint-glow'), 3000);
          }
        });
        return;
      }
    }
  }
  showToast('No visible moves — check face-down tiles');
}

function shuffleBoard() {
  const rng = mulberry32(Date.now());
  const alive = G.tiles.filter(t => !t.matched && !t.inTray);
  const types = alive.map(t => t.typeIndex);
  seededShuffle(types, rng);
  alive.forEach((t, i) => { t.typeIndex = types[i]; });
  renderBoard();
  showToast('Tiles shuffled');
}

function updateUI() {
  const rem = G.totalPairs - G.matchedPairs;
  document.getElementById('pairs-label').textContent = `${rem} pair${rem !== 1 ? 's' : ''} remaining`;
  document.getElementById('level-label').textContent  = `Level ${G.level}`;
  document.getElementById('title-level').textContent  = `Level ${G.level}`;
  const pct = G.totalPairs > 0 ? (G.matchedPairs / G.totalPairs) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function startLevel(level) {
  G.level = Math.max(1, level);
  saveLevel();
  const { tiles, cols, rows, totalPairs } = generateLevel(G.level);
  G.tiles = tiles;
  G.cols  = cols;
  G.rows  = rows;
  G.totalPairs   = totalPairs;
  G.matchedPairs = 0;
  G.tray = [null, null, null, null];
  G.history = [];
  G.startTime = Date.now();
  G.revealedId = null;
  ['win-overlay','stuck-overlay','fail-overlay','pause-overlay'].forEach(id =>
    document.getElementById(id).classList.add('hidden')
  );
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  renderBoard();
}

let _tt;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2500);
}

document.getElementById('start-btn').addEventListener('click', () => startLevel(G.level));
document.getElementById('hint-btn').addEventListener('click', showHint);
document.getElementById('undo-btn').addEventListener('click', undoLastMove);
document.getElementById('menu-btn').addEventListener('click', () => {
  document.getElementById('pause-overlay').classList.remove('hidden');
});
document.getElementById('resume-btn').addEventListener('click', () => {
  document.getElementById('pause-overlay').classList.add('hidden');
});
document.getElementById('theme-btn').addEventListener('click', () => {
  document.body.classList.toggle('dark-theme');
});
document.getElementById('quit-btn').addEventListener('click', () => {
  document.getElementById('pause-overlay').classList.add('hidden');
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('title-screen').classList.remove('hidden');
  updateUI();
});

const triggerShuffle = () => {
  document.getElementById('stuck-overlay').classList.add('hidden');
  shuffleBoard();
};
document.getElementById('shuffle-btn').addEventListener('click', triggerShuffle);
document.getElementById('stuck-shuffle-btn')?.addEventListener('click', triggerShuffle);

document.getElementById('next-btn').addEventListener('click', () => startLevel(G.level + 1));
document.getElementById('restart-btn').addEventListener('click', () => startLevel(G.level));
document.getElementById('fail-restart-btn').addEventListener('click', () => startLevel(G.level));

let _rt;
window.addEventListener('resize', () => {
  clearTimeout(_rt);
  _rt = setTimeout(() => {
    if (!document.getElementById('game-screen').classList.contains('hidden')) renderBoard();
  }, 150);
});

updateUI();
if ('serviceWorker' in navigator)
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
</script>
